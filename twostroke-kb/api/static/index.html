<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TwoStrokeGPT</title>
  <style>
    :root {
      --fg:#1c1917; --muted:#78716c; --bg:#fafaf9; --card:#fff;
      --border:#e7e5e4; --accent:#b45309; --green:#15803d; --red:#b91c1c;
    }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin:0; background:var(--bg); color:var(--fg); }
    header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
    header h1 { font-size:16px; font-weight:700; margin:0; flex:1; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
    main { max-width:860px; margin:0 auto; padding:24px; }
    .row { display:flex; gap:8px; align-items:center; }
    input[type=text] { flex:1; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; }
    button { padding:9px 16px; border:0; border-radius:8px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; font-size:14px; }
    button.secondary { background:#f5f5f4; color:var(--fg); border:1px solid var(--border); }
    button.active   { background:var(--accent); color:#fff; }
    button.inactive { background:#f5f5f4; color:var(--muted); border:1px solid var(--border); }
    .muted { color:var(--muted); font-size:13px; }
    #answer { white-space:pre-wrap; line-height:1.6; margin-top:10px; min-height:1.5em; }
    .cite {
      font-size:12px; color:var(--muted); border-left:3px solid var(--accent);
      padding:4px 8px; margin-top:6px; border-radius:0 4px 4px 0; background:#fef9f0;
    }
    .cite strong { color:var(--fg); }
    .related-pill {
      display:inline-block; margin:3px; padding:4px 10px;
      background:#f5f5f4; border:1px solid var(--border);
      border-radius:999px; font-size:12px; cursor:pointer; color:var(--fg);
    }
    .related-pill:hover { background:#e7e5e4; }
    .confidence { font-size:12px; font-weight:600; padding:2px 8px; border-radius:4px; margin-left:8px; }
    .confidence.high { background:#dcfce7; color:var(--green); }
    .confidence.low  { background:#fee2e2; color:var(--red); }
    #uploadStatus { margin-top:8px; }
    #answerSection { display:none; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #ccc;
      border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Cursor blink while streaming */
    .streaming-cursor::after {
      content: "▍"; animation: blink 1s step-end infinite; color:var(--accent);
    }
    @keyframes blink { 50% { opacity:0; } }
  </style>
</head>
<body>
  <header>
    <h1>TwoStrokeGPT — two-stroke knowledge assistant</h1>
    <span class="muted" style="font-size:13px">Mode:</span>
    <button id="btnBeginner" class="inactive" onclick="setMode('beginner')">Beginner</button>
    <button id="btnExpert"   class="active"   onclick="setMode('expert')">Expert</button>
  </header>

  <main>
    <!-- Upload -->
    <div class="card">
      <strong>1 · Upload a document</strong>
      <p class="muted" style="margin:4px 0 10px">PDF · scanned PDF · DOCX · DOC · XLSX · CSV · PPTX · images · .url</p>
      <div class="row">
        <input type="file" id="file" />
        <button onclick="upload()">Upload &amp; Index</button>
      </div>
      <div id="uploadStatus" class="muted"></div>
    </div>

    <!-- Ask -->
    <div class="card">
      <strong>2 · Ask a question (EN / DE)</strong>
      <div class="row" style="margin-top:8px">
        <input type="text" id="q"
          placeholder="z. B. Warum überhitzt mein Hirth 3503 in der Höhe?" />
        <button id="askBtn" onclick="ask()">Ask</button>
      </div>

      <div id="answerSection">
        <div class="row" style="margin-top:12px; align-items:flex-start">
          <div id="answer" style="flex:1"></div>
          <span id="confidenceBadge" class="confidence" style="flex-shrink:0"></span>
        </div>
        <div id="citations" style="margin-top:8px"></div>
        <div id="related"  style="margin-top:10px"></div>
        <div class="row" id="fb" style="margin-top:12px">
          <button class="secondary" onclick="feedback(1)">👍 Helpful</button>
          <button class="secondary" onclick="feedback(-1)">👎 Not right</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const SID = "web-" + Math.random().toString(36).slice(2);
    let last = { q: "", a: "" };
    let mode = "expert";
    let _abortCtrl = null;

    function setMode(m) {
      mode = m;
      document.getElementById("btnBeginner").className = m === "beginner" ? "active" : "inactive";
      document.getElementById("btnExpert").className   = m === "expert"   ? "active" : "inactive";
    }

    async function upload() {
      const f = document.getElementById("file").files[0];
      if (!f) return;
      const el = document.getElementById("uploadStatus");
      el.innerHTML = '<span class="spinner"></span> Uploading &amp; indexing…';
      const fd = new FormData(); fd.append("file", f);
      try {
        const r = await fetch("/upload", { method: "POST", body: fd });
        const j = await r.json();
        el.textContent = j.error
          ? "Error: " + j.error
          : `✓ ${j.filename} v${j.version || 1} — ${j.chunks} chunks, ${j.facts} facts (${j.skipped_duplicates} dupes skipped)`;
      } catch (e) {
        el.textContent = "Upload failed: " + e.message;
      }
    }

    async function ask() {
      const q = document.getElementById("q").value.trim();
      if (!q) return;

      // Cancel any in-flight stream
      if (_abortCtrl) _abortCtrl.abort();
      _abortCtrl = new AbortController();

      last = { q, a: "" };
      const answerEl  = document.getElementById("answer");
      const badgeEl   = document.getElementById("confidenceBadge");
      const citesEl   = document.getElementById("citations");
      const relatedEl = document.getElementById("related");
      const fbEl      = document.getElementById("fb");

      document.getElementById("answerSection").style.display = "block";
      answerEl.className = "";
      answerEl.innerHTML = '<span class="spinner"></span> <span class="muted">Thinking…</span>';
      badgeEl.textContent = "";
      citesEl.innerHTML   = "";
      relatedEl.innerHTML = "";
      fbEl.innerHTML =
        '<button class="secondary" onclick="feedback(1)">👍 Helpful</button>' +
        '<button class="secondary" onclick="feedback(-1)">👎 Not right</button>';

      const fd = new FormData();
      fd.append("question",   q);
      fd.append("session_id", SID);
      fd.append("expertise",  mode);

      let firstDelta = true;

      try {
        const resp = await fetch("/ask/stream", {
          method: "POST", body: fd, signal: _abortCtrl.signal
        });
        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split("\n\n");
          buffer = blocks.pop(); // keep incomplete trailing chunk

          for (const block of blocks) {
            if (!block.startsWith("data: ")) continue;
            let ev;
            try { ev = JSON.parse(block.slice(6)); } catch { continue; }

            if (ev.type === "thinking") {
              if (firstDelta) {
                answerEl.innerHTML =
                  `<span class="spinner"></span> <span class="muted">${ev.text}</span>`;
              }
            } else if (ev.type === "delta") {
              if (firstDelta) {
                answerEl.textContent = "";
                answerEl.className = "streaming-cursor";
                firstDelta = false;
              }
              last.a += ev.text;
              answerEl.textContent = last.a;
            } else if (ev.type === "error") {
              answerEl.className = "";
              answerEl.textContent = "Error: " + ev.text;
            } else if (ev.type === "done") {
              answerEl.className = "";   // remove streaming cursor
              _renderDone(ev, citesEl, badgeEl, relatedEl);
            }
          }
        }
      } catch (e) {
        if (e.name !== "AbortError") {
          answerEl.className = "";
          answerEl.textContent = "Error: " + e.message;
        }
      }
    }

    function _renderDone(ev, citesEl, badgeEl, relatedEl) {
      // Confidence badge
      if (ev.confidence) {
        badgeEl.textContent = ev.confidence === "high" ? "✓ Grounded" : "⚠ Unverified";
        badgeEl.className   = "confidence " + (ev.confidence === "high" ? "high" : "low");
      }

      // Citation cards
      const cites = (ev.citations || []).map(c => {
        const loc = c.page ? ` p.${c.page}` : "";
        return `<div class="cite"><strong>[${c.n}]</strong> ${c.filename || c.doc_id}${loc}<br>
                <span class="muted">${(c.snippet || "").slice(0, 120)}…</span></div>`;
      }).join("");
      citesEl.innerHTML = cites;

      // Related question pills
      const rel = ev.related_questions || [];
      if (rel.length) {
        relatedEl.innerHTML =
          '<div class="muted" style="margin-bottom:4px">Related questions:</div>' +
          rel.map(q => `<span class="related-pill" onclick="setQ(this)">${q}</span>`).join("");
      }
    }

    function setQ(el) {
      document.getElementById("q").value = el.textContent;
      ask();
    }

    async function feedback(vote) {
      const fd = new FormData();
      fd.append("session_id", SID); fd.append("question", last.q);
      fd.append("answer", last.a); fd.append("vote", vote);
      try { await fetch("/feedback", { method: "POST", body: fd }); } catch (_) {}
      document.getElementById("fb").innerHTML =
        '<span class="muted">Thanks — feedback recorded.</span>';
    }
  </script>
</body>
</html>
