<div id="exit-overlay" style="position:fixed;inset:0;z-index:9999;background:#05070a;opacity:0;pointer-events:none;transition:opacity .6s ease"></div>
<script>
(function(){
  function getTheme() {
    return document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
  }
  function applyTheme(theme) {
    var next = theme === 'light' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('twostroke-theme', next); } catch (_) {}
    var target = next === 'light' ? 'dark' : 'light';
    document.querySelectorAll('[data-theme-toggle]').forEach(function(btn){
      btn.textContent = target.charAt(0).toUpperCase() + target.slice(1);
      btn.setAttribute('aria-label', 'Switch to ' + target + ' mode');
      btn.setAttribute('title', 'Switch to ' + target + ' mode');
    });
  }
  window.toggleTheme = function() {
    applyTheme(getTheme() === 'light' ? 'dark' : 'light');
  };
  applyTheme(getTheme());

  // Intercept all /app links and fade before navigating
  document.addEventListener('click', function(e){
    var a = e.target.closest('a[href="/app"]');
    if(!a) return;
    e.preventDefault();
    var ov = document.getElementById('exit-overlay');
    ov.style.pointerEvents = 'all';
    ov.style.opacity = '1';
    setTimeout(function(){ window.location.href = '/app'; }, 630);
  });
})();
</script>
